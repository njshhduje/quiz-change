<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>回答者 - 並び替え</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div class="container">
        <header class="index-header">
            <h1 id="q-header">第1問</h1>
            <input type="text" id="username" placeholder="名前を入力" class="input-field">
        </header>

        <p class="guide">1番から順にドラッグして入れてください</p>
        
        <div id="slots" class="slot-container"></div>
        
        <hr class="separator">
        
        <div id="cards" class="card-grid"></div>
        
        <button id="send-btn" onclick="sendAnswer()" class="btn-primary">回答を送信</button>
    </div>

    <script>
const socket = io();
const slotsEl = document.getElementById('slots');
const cardsEl = document.getElementById('cards');

// Sortableのインスタンスを保持（後で無効化するため）
const sortableSlots = new Sortable(slotsEl, {
    group: 'quiz',
    animation: 150,
    ghostClass: 'sortable-ghost'
});

const sortableCards = new Sortable(cardsEl, {
    group: 'quiz',
    animation: 150,
    ghostClass: 'sortable-ghost'
});

// 送信関数
function sendAnswer() {
    const nameInput = document.getElementById('username');
    const btn = document.getElementById('send-btn');
    const name = nameInput.value.trim();

    // 枠内のカードを取得（空白を除外）
    const answers = Array.from(slotsEl.children)
        .map(el => el.innerText.trim())
        .filter(t => t !== "");

    // --- バリデーション ---
    if (!name) {
        alert("名前を入力してください");
        return;
    }
    if (answers.length < 8) {
        alert("8つ全ての選択肢を上の枠に入れてください！");
        return;
    }

    // --- 送信処理 ---
    const payload = { name: name, cards: answers };
    socket.emit('submit', payload);

    // --- 送信後のロック ---
    btn.disabled = true;
    btn.innerText = "送信完了（待機中）";
    nameInput.disabled = true;
    
    // ドラッグ＆ドロップを禁止にする
    sortableSlots.option("disabled", true);
    sortableCards.option("disabled", true);
    
    // 視覚的に「確定した」感を出るようにする
    document.querySelector('.container').style.opacity = "0.7";
    alert("送信しました！管理者が公開するまでお待ちください。");
}

// サーバーから「次の問題」の合図が来たらロックを解除
socket.on('update', state => {
    document.getElementById('q-header').innerText = `第${state.currentNum}問`;
    
    // サーバー側で players が空（リセット状態）なら画面を元に戻す
    if (Object.keys(state.players).length === 0) {
        const btn = document.getElementById('send-btn');
        const nameInput = document.getElementById('username');
        
        btn.disabled = false;
        btn.innerText = "回答を送信";
        nameInput.disabled = false;
        sortableSlots.option("disabled", false);
        sortableCards.option("disabled", false);
        document.querySelector('.container').style.opacity = "1";
        
        // カードの再生成（既存のコード通り）
        slotsEl.innerHTML = ""; cardsEl.innerHTML = "";
        for(let i=0; i<8; i++) {
            const s = document.createElement('div');
            s.className = "slot-item";
            s.setAttribute('data-num', i + 1);
            slotsEl.appendChild(s);
        }
        state.choices.forEach(text => {
            const c = document.createElement('div');
            c.className = "card-item";
            c.innerText = text;
            cardsEl.appendChild(c);
        });
    }
});
    </script>
</body>
</html>
