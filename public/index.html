<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>回答者 - 並び替え</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div class="container">
        <header class="index-header">
            <h1 id="q-header">第1問</h1>
            <input type="text" id="username" placeholder="名前を入力" class="input-field">
        </header>

        <p class="guide">1番から順にドラッグして入れてください</p>
        
        <div id="slots" class="slot-container"></div>
        
        <hr class="separator">
        
        <div id="cards" class="card-grid"></div>
        
        <button id="send-btn" onclick="sendAnswer()" class="btn-primary">回答を送信</button>
    </div>

    <script>
// index.htmlのscriptタグ内を以下に差し替えてください
const socket = io();
const slotsEl = document.getElementById('slots');
const cardsEl = document.getElementById('cards');

// SortableJSの設定（枠へのドロップを確実にする）
new Sortable(slotsEl, {
    group: 'quiz-group', // cardsElと同じグループ名にする
    animation: 150,
    ghostClass: 'sortable-ghost',
    onAdd: function (evt) {
        // カードが枠に追加された時の処理
        checkSlotCount();
    }
});

new Sortable(cardsEl, {
    group: 'quiz-group',
    animation: 150,
    ghostClass: 'sortable-ghost'
});

// 枠が8個を超えないように、または空欄を維持するロジック
function checkSlotCount() {
    // 枠内のアイテムがカードであれば、背景の番号などを調整する処理（任意）
}

socket.on('update', state => {
    document.getElementById('q-header').innerText = `第${state.currentNum}問`;
    
    // リセット時（次の問題へ）の処理
    if (Object.keys(state.players).length === 0) {
        slotsEl.innerHTML = ""; 
        cardsEl.innerHTML = "";
        
        // 最初に空のスロットを表示したい場合は、これらを「空のカード」として扱うと操作が難しいので、
        // シンプルに「回答エリア」へカードを並べていくUIがベストです。
        state.choices.forEach((text, i) => {
            const c = document.createElement('div');
            c.className = "card-item";
            c.innerText = text;
            cardsEl.appendChild(c);
        });
        
        // ガイド用の空枠を背景として作りたい場合はCSSで対応します
        document.getElementById('send-btn').disabled = false;
        document.getElementById('send-btn').innerText = "回答を送信";
    }
});
    </script>
</body>
</html>
