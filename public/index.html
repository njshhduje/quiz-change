<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>回答者</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div class="container">
        <h1 id="q-header">第1問</h1>
        <input type="text" id="username" placeholder="名前を入力" class="input-field">
        
        <p class="guide">下の選択肢を上の枠へドラッグしてください</p>
        <div id="slots" class="grid-8 sort-area"></div>
        
        <hr>
        <div id="cards" class="grid-8 sort-area"></div>
        
        <button id="send-btn" onclick="sendAnswer()" class="btn-primary">回答を送信</button>
    </div>

    <script>
        const socket = io();
        const slotsEl = document.getElementById('slots');
        const cardsEl = document.getElementById('cards');

        // 並び替え機能を有効化
        [slotsEl, cardsEl].forEach(el => {
            new Sortable(el, { group: 'quiz', animation: 150, ghostClass: 'ghost' });
        });

        socket.on('update', state => {
            document.getElementById('q-header').innerText = `第${state.currentNum}問`;
            if (Object.keys(state.players).length === 0) {
                slotsEl.innerHTML = ""; cardsEl.innerHTML = "";
                // 空のスロットを8つ作成
                for(let i=0; i<8; i++) {
                    const s = document.createElement('div');
                    s.className = "slot-item";
                    slotsEl.appendChild(s);
                }
                // カードを8つ作成
                state.choices.forEach(text => {
                    const c = document.createElement('div');
                    c.className = "card-item";
                    c.innerText = text;
                    cardsEl.appendChild(c);
                });
                document.getElementById('send-btn').disabled = false;
            }
        });

        function sendAnswer() {
            const name = document.getElementById('username').value;
            const answers = Array.from(slotsEl.children).map(el => el.innerText).filter(t => t !== "");
            if (!name || answers.length < 8) return alert("名前を入力し、8つ全て枠に入れてください");
            socket.emit('submit', { name, cards: answers });
            document.getElementById('send-btn').disabled = true;
        }
    </script>
</body>
</html>
