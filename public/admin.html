<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
    <title>管理</title>
</head>
<body>
    <div class="container admin-card">
        <h1>Admin Control</h1>
        <div class="status-bar">
            現在公開中: <strong id="reveal-status">0</strong> / 8
        </div>
        <div class="admin-btns">
            <button onclick="control('next-step')" class="btn-step">＋ 1つずつ表示</button>
            <button onclick="control('hide-all')" class="btn-reset">表示を隠す</button>
            <button onclick="control('next-quiz')" class="btn-next">次の問題へ</button>
        </div>
        <div id="admin-list" class="player-list-admin"></div>
    </div>

    <script>
        const socket = io();
        function control(type, id, result) { socket.emit('admin-control', { type, id, result }); }
        socket.on('update', state => {
            document.getElementById('reveal-status').innerText = state.revealedCount;
            const list = document.getElementById('admin-list');
            list.innerHTML = "";
            Object.keys(state.players).forEach(id => {
                const p = state.players[id];
                list.innerHTML += `
                    <div class="admin-row">
                        <span>${p.name}</span>
                        <div class="judge-btns">
                            <button onclick="control('judge', '${id}', 'correct')" class="btn-o">◯</button>
                            <button onclick="control('judge', '${id}', 'incorrect')" class="btn-x">✕</button>
                        </div>
                    </div>`;
            });
        });
    </script>
</body>
</html>
