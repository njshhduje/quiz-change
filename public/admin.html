<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div class="container admin-card">
        <h1>管理パネル</h1>
        <div class="admin-btns">
            <button onclick="send('next-step')" class="btn-primary">1つ表示</button>
            <button onclick="send('scoring')" class="btn-scoring">採点する</button>
            <button onclick="confirm('リセットしますか？') && send('reset')" class="btn-reset">リセット</button>
        </div>
        <div id="p-list"></div>
    </div>
    <script>
        const socket = io();
        const send = (type) => socket.emit('admin-control', { type });
        socket.on('update', state => {
            document.getElementById('p-list').innerHTML = Object.values(state.players)
                .map(p => `<div class="admin-row"><span>${p.name}</span> <span>${p.isCorrect || '未採点'}</span></div>`).join('');
        });
    </script>
</body>
</html>
