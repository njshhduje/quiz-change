<body style="background: #e9ecef;">
    <div class="display-2x3" id="grid"></div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        socket.on('update', state => {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            Object.keys(state.players).slice(0, 6).forEach(id => {
                const p = state.players[id];
                let cardsHtml = "";
                for(let i=0; i<8; i++) {
                    const content = (i < state.revealedCount) ? p.cards[i] : "？？？";
                    cardsHtml += `<div class="ans-item"><span>${i+1}</span> <span>${content}</span></div>`;
                }
                grid.innerHTML += `
                    <div class="player-box ${p.isCorrect || ''}">
                        <h2 style="font-size: 2rem; margin: 0 0 10px 0; text-align:center;">${p.name}</h2>
                        <div>${cardsHtml}</div>
                    </div>`;
            });
        });
    </script>
</body>
