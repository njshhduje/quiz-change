<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body class="display-body">
    <div class="display-header">
        <h1 id="q-title">QUIZ STAGE</h1>
        <div id="q-num-badge">第 1 問</div>
    </div>

    <div class="display-2x3" id="grid">
        </div>

    <script>
        const socket = io();
        socket.on('update', state => {
            document.getElementById('q-num-badge').innerText = `第 ${state.currentNum} 問`;
            const grid = document.getElementById('grid');
            grid.innerHTML = "";

            // 6人分取得して表示
            const playerIds = Object.keys(state.players).slice(0, 6);
            playerIds.forEach(id => {
                const p = state.players[id];
                
                // 8つの回答リストを作成
                let cardsHtml = "";
                for(let i = 0; i < 8; i++) {
                    const isRevealed = (i < state.revealedCount);
                    const content = isRevealed ? p.cards[i] : "";
                    cardsHtml += `
                        <div class="ans-row ${isRevealed ? 'revealed' : 'hidden'}">
                            <span class="ans-num">${i + 1}</span>
                            <span class="ans-text">${content}</span>
                        </div>`;
                }

                grid.innerHTML += `
                    <div class="player-card-v2 ${p.isCorrect || ''}">
                        <div class="player-tag">${p.name}</div>
                        <div class="ans-list-v2">
                            ${cardsHtml}
                        </div>
                        <div class="judge-overlay">${p.isCorrect === 'correct' ? 'CLEAR!' : 'MISS'}</div>
                    </div>`;
            });
        });
    </script>
</body>
</html>
