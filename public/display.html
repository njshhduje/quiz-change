<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body class="display-bg">
    <div class="display-header"><h1>並べ替えクイズ</h1></div>
    <div class="display-grid-5" id="grid"></div>

    <script>
        const socket = io();
        socket.on('update', state => {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            Object.keys(state.players).forEach(id => {
                const p = state.players[id];
                let cardsHtml = "";
                for(let i=0; i<8; i++) {
                    const open = i < state.revealedCount;
                    cardsHtml += `<div class="mini-card ${open ? 'is-open' : ''}">${open ? p.cards[i] : ''}</div>`;
                }
                grid.innerHTML += `
                    <div class="p-panel ${p.isCorrect || ''}">
                        <div class="p-name">${p.name}</div>
                        <div class="p-cards-grid">${cardsHtml}</div>
                        <div class="mark">${p.isCorrect === 'correct' ? '◯' : p.isCorrect === 'incorrect' ? '×' : ''}</div>
                    </div>`;
            });
        });
    </script>
</body>
</html>
